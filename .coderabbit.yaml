# CodeRabbit review preferences for Aura
# https://docs.coderabbit.ai/guides/configure-coderabbit

language: en-US
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - '!dist/**'
    - '!dist-electron/**'
    - '!node_modules/**'
    - '!package-lock.json'
    - '!docs/superpowers/**'
    - '!**/*.png'
chat:
  auto_reply: true
knowledge_base:
  learnings:
    scope: auto
